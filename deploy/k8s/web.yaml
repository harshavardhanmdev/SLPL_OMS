apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oms-uploads
  namespace: oms
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: oms-web
  namespace: oms
spec:
  selector:
    app: oms-web
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oms-web
  namespace: oms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oms-web
  template:
    metadata:
      labels:
        app: oms-web
    spec:
      initContainers:
        - name: migrate
          image: oms-worker:latest # builder image has the prisma CLI
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: oms-env
      containers:
        - name: web
          image: oms-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: oms-env
          env:
            - name: UPLOADS_DIR
              value: /app/uploads
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
          resources:
            requests:
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: oms-uploads
